# Template showing all available options for ScorePredictor configuration
# Copy this file and modify for your specific use case

predictor:
  # Architecture settings
  architecture:
    # Text encoder type
    # Options: pertokenscalar, pooling, compression_first, compression_later
    text_encoder: pertokenscalar

    # Noise encoder type
    # Options: spatial_shrink, channel_squash, basic_cnn_avg, basic_cnn_max, resnet_avgpool, resnet_maxpool
    noise_encoder: spatial_shrink

    # Dropout rate in fusion MLP
    dropout: 0.1

    # Number of output heads
    # 1: single-target mode (default)
    # 3: multi-target mode (hpsv2, image_reward, clip_score)
    num_heads: 1

  # Checkpoint settings
  weights:
    # Path to .pth checkpoint file
    checkpoint_path: checkpoints/best_model.pth

    # Device to load model on
    # Options: cuda, cpu
    device: cuda

  # Normalization settings (for denormalizing predictions)
  # Note: Stats are loaded from checkpoint automatically
  normalization:
    # Whether model was trained in multi-target mode
    multi_target: false

    # Target metric name (for reference)
    target: hpsv2
