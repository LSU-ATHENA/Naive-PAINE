# SDXL Training Config
# Latent: 4x128x128, Text: CLIP [77, 2048]

model_type: sdxl
data_dir: data/generated/sdxl_1024

architecture:
  noise_encoder: basic_cnn_avg
  text_encoder: compression_first
  dropout: 0.1

training:
  loss: lambdarank
  gain_type: exp2
  lr: 1e-4
  weight_decay: 1e-8
  batch_size: 256
  epochs: -1          # Auto (100 for lambdarank)
  patience: -1        # Auto (35 for lambdarank)
  multi_target: true
  ndcg_k: 10
  seed: 42
